<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Gestión de categorías de la escuela de fútbol">
    <link rel="icon" href="/icons/logo.png" type="image/png">
    <title>Categorías | futGistro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">

    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#10b981">
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png">
</head>

<body>
    <div class="app-layout" id="appLayout"></div>

    <!-- Modal para Crear / Editar -->
    <div class="modal fade" id="categoriaModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">Nueva Categoría</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form id="categoriaForm">
                    <div class="modal-body">
                        <input type="hidden" id="categoriaId">
                        <div class="mb-3">
                            <label for="nombre" class="form-label-custom">Nombre *</label>
                            <input type="text" id="nombre" class="form-control-custom" placeholder="Ej: Sub 10" required>
                        </div>
                        <div class="mb-3">
                            <label for="anio_nacimiento" class="form-label-custom">Autocalcular por Año de Nacimiento (Opcional)</label>
                            <input type="number" id="anio_nacimiento" class="form-control-custom" placeholder="Ej: 2011">
                            <small style="color:var(--text-muted);font-size:11px">Escribe el año (ej. 2011) para llenar las edades al instante.</small>
                        </div>
                        <div class="row g-3">
                            <div class="col-6">
                                <label for="edad_min" class="form-label-custom">Edad mínima *</label>
                                <input type="number" id="edad_min" class="form-control-custom" min="1" max="99" required placeholder="Ej: 8">
                            </div>
                            <div class="col-6">
                                <label for="edad_max" class="form-label-custom">Edad máxima *</label>
                                <input type="number" id="edad_max" class="form-control-custom" min="1" max="99" required placeholder="Ej: 10">
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn-secondary-custom" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn-primary-custom" id="btnSave">
                            <i class="bi bi-check-circle"></i> Guardar
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/app.js"></script>
    <script src="/js/categorias.js"></script>
</body>

</html>
