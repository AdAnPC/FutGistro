<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/icons/logo.png" type="image/png">
  <title>Crear tu Escuela | futGistro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">

  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#10b981">
  <link rel="apple-touch-icon" href="/icons/logo.png">
</head>

<body>
  <div class="login-page">
    <div class="login-card slide-up" style="max-width:460px">
      <div class="logo">
        <div class="logo-icon" style="background:transparent;display:flex;align-items:center;justify-content:center;">
          <img src="/icons/logo.png" alt="futGistro" style="width:80px;height:80px;object-fit:contain;border-radius:8px;">
        </div>
        <h3>Crea tu Escuela</h3>
        <p>Escribe el nombre de tu escuela para continuar. Tus jugadores solo serán visibles dentro de tu escuela.</p>
      </div>

      <form id="escuelaForm">
        <div class="mb-4">
          <label for="escuela_nombre" class="form-label-custom">Nombre de tu Escuela / Sede *</label>
          <input type="text" id="escuela_nombre" class="form-control-custom" placeholder="Ej: futGistro Norte" required>
        </div>

        <div id="errorMsg" class="mb-3" style="display:none">
          <div style="background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);border-radius:var(--radius-sm);padding:10px 14px;color:var(--danger);font-size:13px">
            <i class="bi bi-exclamation-circle me-1"></i>
            <span id="errorText"></span>
          </div>
        </div>

        <button type="submit" class="btn-primary-custom w-100 justify-content-center py-3" id="btnSelect">
          <i class="bi bi-check-circle"></i> Crear Escuela y Continuar
        </button>
      </form>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script src="/js/seleccionar-escuela.js"></script>
</body>

</html>
