<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Registrar nuevo usuario en el sistema de gestión">
  <title>Registrar Usuario | futGistro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">

  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#10b981">
  <link rel="apple-touch-icon" href="/icons/logo.png">
</head>

<body>
  <div class="login-page">
    <div class="login-card slide-up" style="max-width: 480px">
      <div class="logo">
        <div class="logo-icon"
          style="background: transparent; display: flex; align-items: center; justify-content: center;">
          <img src="/icons/logo.png" alt="futGistro"
            style="width: 80px; height: 80px; object-fit: contain; border-radius: 8px;">
        </div>
        <h3>Crear Usuario</h3>
        <p>Registrar un nuevo usuario en el sistema</p>
      </div>

      <form id="registroForm">
        <div class="mb-3">
          <label for="nombre" class="form-label-custom">Nombre completo</label>
          <input type="text" id="nombre" class="form-control-custom" placeholder="Nombre del usuario" required>
        </div>

        <div class="mb-3">
          <label for="email" class="form-label-custom">Correo electrónico</label>
          <input type="email" id="email" class="form-control-custom" placeholder="correo@ejemplo.com" required>
        </div>

        <div class="mb-3">
          <label for="password" class="form-label-custom">Contraseña</label>
          <input type="password" id="password" class="form-control-custom" placeholder="Mínimo 6 caracteres" required
            minlength="6">
        </div>

        <div class="mb-3">
          <label for="rol" class="form-label-custom">Rol</label>
          <select id="rol" class="form-select-custom" required>
            <option value="entrenador">Entrenador</option>
            <option value="administrador">Administrador</option>
            <option value="superadmin">Super Administrador</option>
          </select>
        </div>

        <div class="mb-4" id="escuelaGroup">
          <label for="escuela_nombre" class="form-label-custom">Nombre de tu Escuela / Sede *</label>
          <input type="text" id="escuela_nombre" class="form-control-custom" placeholder="Ej: futGistro Norte" required>
          <div style="font-size:11px;color:var(--text-muted);margin-top:4px">
            <i class="bi bi-info-circle"></i> Se creará la escuela automáticamente. El usuario solo verá jugadores de su
            escuela.
          </div>
        </div>

        <div id="errorMsg" class="mb-3" style="display:none">
          <div
            style="background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);border-radius:var(--radius-sm);padding:10px 14px;color:var(--danger);font-size:13px">
            <i class="bi bi-exclamation-circle me-1"></i>
            <span id="errorText"></span>
          </div>
        </div>

        <button type="submit" class="btn-primary-custom w-100 justify-content-center py-3" id="btnRegistro">
          <i class="bi bi-person-plus"></i> Crear Usuario
        </button>
      </form>

      <div class="text-center mt-3">
        <a href="/dashboard" style="color:var(--text-muted);font-size:13px;text-decoration:none">
          <i class="bi bi-arrow-left"></i> Volver al Dashboard
        </a>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    const form = document.getElementById('registroForm');
    const errorMsg = document.getElementById('errorMsg');
    const errorText = document.getElementById('errorText');

    document.addEventListener('DOMContentLoaded', () => {
      // Toggle escuela field based on role
      const rolSelect = document.getElementById('rol');
      rolSelect.addEventListener('change', () => {
        const group = document.getElementById('escuelaGroup');
        const escInput = document.getElementById('escuela_nombre');
        if (rolSelect.value === 'superadmin') {
          group.style.display = 'none';
          escInput.removeAttribute('required');
        } else {
          group.style.display = '';
          escInput.setAttribute('required', 'required');
        }
      });
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.style.display = 'none';

      const btn = document.getElementById('btnRegistro');
      btn.disabled = true;
      btn.innerHTML = '<div class="spinner" style="width:20px;height:20px;border-width:2px"></div> Creando...';

      try {
        const data = await fetchAPI('/auth/registro', {
          method: 'POST',
          body: {
            nombre: document.getElementById('nombre').value,
            email: document.getElementById('email').value,
            password: document.getElementById('password').value,
            rol: document.getElementById('rol').value,
            escuela_nombre: document.getElementById('escuela_nombre').value || null
          }
        });

        if (data && data.success) {
          showToast('Usuario y escuela creados exitosamente');
          setTimeout(() => {
            window.location.href = '/dashboard';
          }, 1500);
        }
      } catch (error) {
        errorMsg.style.display = 'block';
        errorText.textContent = error.message || 'Error al crear usuario';
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-person-plus"></i> Crear Usuario';
      }
    });
  </script>
</body>

</html>
