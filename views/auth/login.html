<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="description" content="Sistema de gestión de escuela de fútbol - Iniciar sesión">
  <link rel="icon" href="/icons/logo.png" type="image/png">
  <title>Iniciar Sesión | futGistro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">

  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#10b981">
  <link rel="apple-touch-icon" href="/icons/logo.png">
</head>

<body>
  <div class="login-page">
    <div class="login-card slide-up">
      <div class="logo">
        <div class="logo-icon"
          style="background: transparent; display: flex; align-items: center; justify-content: center;">
          <img src="/icons/logo.png" alt="futGistro"
            style="width: 80px; height: 80px; object-fit: contain; border-radius: 8px;">
        </div>
        <h3>futGistro</h3>
        <p>Sistema de Gestión Deportiva</p>
      </div>

      <form id="loginForm" autocomplete="on">
        <div class="mb-3">
          <label for="email" class="form-label-custom">Correo electrónico</label>
          <div class="position-relative">
            <input type="email" id="email" class="form-control-custom" placeholder="tu@correo.com" required
              autocomplete="email" style="padding-left: 40px">
            <i class="bi bi-envelope"
              style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-muted)"></i>
          </div>
        </div>

        <div class="mb-4">
          <label for="password" class="form-label-custom">Contraseña</label>
          <div class="position-relative">
            <input type="password" id="password" class="form-control-custom" placeholder="••••••••" required
              autocomplete="current-password" style="padding-left: 40px; padding-right: 40px">
            <i class="bi bi-lock"
              style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-muted)"></i>
            <button type="button" id="togglePassword"
              style="position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer">
              <i class="bi bi-eye"></i>
            </button>
          </div>
        </div>

        <div id="errorMsg" class="mb-3" style="display:none">
          <div
            style="background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);border-radius:var(--radius-sm);padding:10px 14px;color:var(--danger);font-size:13px">
            <i class="bi bi-exclamation-circle me-1"></i>
            <span id="errorText"></span>
          </div>
        </div>

        <button type="submit" class="btn-primary-custom w-100 justify-content-center py-3" id="btnLogin">
          <i class="bi bi-box-arrow-in-right"></i> Iniciar Sesión
        </button>
      </form>

      <div class="text-center mt-4">
        <small style="color:var(--text-muted);font-size:12px">
          futGistro &copy; 2026 | Todos los derechos reservados
        </small>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    const form = document.getElementById('loginForm');
    const errorMsg = document.getElementById('errorMsg');
    const errorText = document.getElementById('errorText');
    const togglePassword = document.getElementById('togglePassword');

    togglePassword.addEventListener('click', () => {
      const input = document.getElementById('password');
      const icon = togglePassword.querySelector('i');
      if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'bi bi-eye-slash';
      } else {
        input.type = 'password';
        icon.className = 'bi bi-eye';
      }
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.style.display = 'none';

      const btnLogin = document.getElementById('btnLogin');
      btnLogin.disabled = true;
      btnLogin.innerHTML = '<div class="spinner" style="width:20px;height:20px;border-width:2px"></div> Ingresando...';

      try {
        const data = await fetchAPI('/auth/login', {
          method: 'POST',
          body: {
            email: document.getElementById('email').value,
            password: document.getElementById('password').value
          }
        });

        if (data && data.success) {
          window.location.href = data.redirect || '/dashboard';
        }
      } catch (error) {
        errorMsg.style.display = 'block';
        errorText.textContent = error.message || 'Error al iniciar sesión';
        btnLogin.disabled = false;
        btnLogin.innerHTML = '<i class="bi bi-box-arrow-in-right"></i> Iniciar Sesión';
      }
    });
  </script>
</body>

</html>
