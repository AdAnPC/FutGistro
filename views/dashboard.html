<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="description" content="Panel de control del sistema de gestión de escuela de fútbol">
  <link rel="icon" href="/icons/logo.png" type="image/png">
  <title>Dashboard | futGistro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">

  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#10b981">
  <link rel="apple-touch-icon" href="/icons/icon-192x192.png">
</head>

<body>
  <div class="app-layout" id="appLayout">
    <!-- Sidebar injected by JS -->
  </div>

  <script src="/js/app.js"></script>
  <script>
    let userName = 'Usuario';
    let userRole = 'entrenador';

    document.addEventListener('DOMContentLoaded', async () => {
      const user = await loadUserInfo();
      userName = user.nombre || 'Usuario';
      userRole = user.rol || 'entrenador';
      buildDashboard();
    });

    async function buildDashboard() {
      const layout = document.getElementById('appLayout');

      // We need to get user info - let's make a request and check
      // The user info is embedded in the JWT in the session, accessible server-side
      // For client side, we'll extract from a hidden endpoint or just show defaults

      layout.innerHTML = `
        ${renderSidebar(userName, userRole)}
        <main class="main-content">
          <div class="top-bar">
            <div>
              <button class="menu-toggle" id="menuToggle"><i class="bi bi-list"></i></button>
            </div>
            <div>
              <h4>Dashboard</h4>
              <div class="breadcrumb">Panel de Control</div>
            </div>
            <div></div>
          </div>
          <div class="content-area">
            <!-- Stats Row -->
            <div class="row g-4 mb-4 fade-in" id="statsRow">
              <div class="col-lg-3 col-md-6 col-6">
                <div class="stat-card">
                  <div class="stat-card-icon green"><i class="bi bi-people-fill"></i></div>
                  <div class="stat-card-value" id="totalJugadores">--</div>
                  <div class="stat-card-label">Total Jugadores</div>
                </div>
              </div>
              <div class="col-lg-3 col-md-6 col-6">
                <div class="stat-card">
                  <div class="stat-card-icon blue"><i class="bi bi-tags-fill"></i></div>
                  <div class="stat-card-value" id="totalCategorias">--</div>
                  <div class="stat-card-label">Categorías</div>
                </div>
              </div>
              <div class="col-lg-3 col-md-6 col-6">
                <div class="stat-card">
                  <div class="stat-card-icon amber"><i class="bi bi-calendar-check-fill"></i></div>
                  <div class="stat-card-value" id="asistenciaHoy">--</div>
                  <div class="stat-card-label">Asistencia Hoy</div>
                </div>
              </div>
              <div class="col-lg-3 col-md-6 col-6">
                <div class="stat-card">
                  <div class="stat-card-icon cyan"><i class="bi bi-building-fill"></i></div>
                  <div class="stat-card-value" id="totalSedes">--</div>
                  <div class="stat-card-label">Escuelas / Sedes</div>
                </div>
              </div>
            </div>

            <!-- Distribution and Quick Actions -->
            <div class="row g-4 mb-4">
              <div class="col-lg-8">
                <div class="data-card slide-up">
                  <div class="data-card-header">
                    <h5><i class="bi bi-bar-chart-fill me-2" style="color:var(--primary)"></i> Jugadores por Categoría</h5>
                  </div>
                  <div class="data-card-body" id="categoriaChart">
                    <!-- Chart bars -->
                  </div>
                </div>
              </div>
              <div class="col-lg-4">
                <div class="data-card slide-up">
                  <div class="data-card-header">
                    <h5><i class="bi bi-lightning-fill me-2" style="color:var(--accent)"></i> Acciones Rápidas</h5>
                  </div>
                  <div class="data-card-body">
                    <div class="d-grid gap-3">
                      <a href="/jugadores/nuevo" class="btn-primary-custom justify-content-center py-3" id="quick-new-player">
                        <i class="bi bi-person-plus-fill"></i> Nuevo Jugador
                      </a>
                      <a href="/asistencia/page" class="btn-secondary-custom justify-content-center py-3" id="quick-attendance">
                        <i class="bi bi-calendar-check"></i> Tomar Asistencia
                      </a>
                      <a href="/categorias/page" class="btn-secondary-custom justify-content-center py-3" id="quick-categories">
                        <i class="bi bi-tags"></i> Ver Categorías
                      </a>
                      <a href="/jugadores/page" class="btn-secondary-custom justify-content-center py-3" id="quick-players">
                        <i class="bi bi-list-ul"></i> Lista de Jugadores
                      </a>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <!-- Recent Players -->
            <div class="data-card slide-up">
              <div class="data-card-header">
                <h5><i class="bi bi-clock-history me-2" style="color:var(--secondary)"></i> Jugadores Recientes</h5>
                <a href="/jugadores/page" class="btn-secondary-custom" id="view-all-players">
                  Ver todos <i class="bi bi-arrow-right"></i>
                </a>
              </div>
              <div style="overflow-x:auto">
                <table class="table-custom">
                  <thead>
                    <tr>
                      <th>Jugador</th>
                      <th>Documento</th>
                      <th>Edad</th>
                      <th>Categoría</th>
                      <th>Inscripción</th>
                      <th>Acciones</th>
                    </tr>
                  </thead>
                  <tbody id="recentPlayers">
                    <tr><td colspan="6" class="text-center" style="padding:40px;color:var(--text-muted)">Cargando...</td></tr>
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </main>
      `;

      initSidebar();
      document.getElementById('nav-dashboard')?.classList.add('active');

      // Load data
      await loadDashboardData();
    }

    async function loadDashboardData() {
      try {
        // Fetch stats
        const statsRes = await fetchAPI('/jugadores/api/estadisticas');
        if (statsRes && statsRes.success) {
          document.getElementById('totalJugadores').textContent = statsRes.data.totalJugadores;
          document.getElementById('totalCategorias').textContent = statsRes.data.porCategoria.length;
          document.getElementById('totalSedes').textContent = statsRes.data.totalEscuelas || 0;

          // Render category chart
          renderCategoryChart(statsRes.data.porCategoria);
        }

        // Fetch recent players
        const playersRes = await fetchAPI('/jugadores/api?limit=5');
        if (playersRes && playersRes.success) {
          renderRecentPlayers(playersRes.data);
        }

        // Fetch today's attendance
        const today = getTodayStr();
        try {
          const attendanceRes = await fetchAPI(`/asistencia/api/por-fecha/${today}`);
          if (attendanceRes && attendanceRes.success) {
            document.getElementById('asistenciaHoy').textContent = attendanceRes.data.length;
          }
        } catch (e) {
          document.getElementById('asistenciaHoy').textContent = '0';
        }
      } catch (error) {
        console.error('Error loading dashboard data:', error);
      }
    }

    function renderCategoryChart(categorias) {
      const container = document.getElementById('categoriaChart');
      if (!categorias || categorias.length === 0) {
        container.innerHTML = '<div class="empty-state"><i class="bi bi-bar-chart"></i><h5>Sin categorías</h5><p>Crea categorías para ver estadísticas</p></div>';
        return;
      }

      const maxVal = Math.max(...categorias.map(c => c.total), 1);
      const colors = ['#10b981', '#0ea5e9', '#f59e0b', '#ef4444', '#8b5cf6', '#06b6d4', '#ec4899'];

      container.innerHTML = categorias.map((cat, i) => {
        const pct = (cat.total / maxVal) * 100;
        const color = colors[i % colors.length];
        return `
          <div style="margin-bottom:16px">
            <div style="display:flex;justify-content:space-between;margin-bottom:6px">
              <span style="font-size:13px;font-weight:600">${escapeHtml(cat.nombre)}</span>
              <span style="font-size:13px;color:var(--text-muted)">${cat.total} jugadores</span>
            </div>
            <div style="height:12px;background:rgba(148,163,184,0.08);border-radius:6px;overflow:hidden">
              <div style="height:100%;width:${pct}%;background:linear-gradient(90deg,${color},${color}dd);border-radius:6px;transition:width 1s ease"></div>
            </div>
          </div>
        `;
      }).join('');
    }

    function renderRecentPlayers(jugadores) {
      const tbody = document.getElementById('recentPlayers');
      if (!jugadores || jugadores.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6"><div class="empty-state"><i class="bi bi-people"></i><h5>Sin jugadores</h5><p>Aún no hay jugadores registrados</p></div></td></tr>';
        return;
      }

      tbody.innerHTML = jugadores.map(j => `
        <tr class="fade-in" style="cursor: pointer; transition: background-color 0.2s;" onclick="if(!event.target.closest('a') && !event.target.closest('button')) window.location.href='/jugadores/ficha/${j.id}'" onmouseover="this.style.backgroundColor='rgba(16, 185, 129, 0.05)'" onmouseout="this.style.backgroundColor=''" title="Ver ficha del jugador">
          <td data-label="Jugador">
            <div style="display:flex;align-items:center;gap:10px">
              ${j.foto
          ? `<img src="${j.foto}" class="player-avatar" alt="${escapeHtml(j.nombre)}">`
          : `<div class="player-avatar-placeholder">${j.nombre.charAt(0).toUpperCase()}</div>`
        }
              <span style="font-weight:600">${escapeHtml(j.nombre)}</span>
            </div>
          </td>
          <td data-label="Documento">${escapeHtml(j.documento)}</td>
          <td data-label="Edad"><span class="badge-custom cyan">${j.edad || calcularEdad(j.fecha_nacimiento)} años</span></td>
          <td data-label="Categoría"><span class="badge-custom green">${j.categoria ? escapeHtml(j.categoria.nombre) : 'Sin categoría'}</span></td>
          <td data-label="Inscripción">${formatDateShort(j.fecha_registro)}</td>
          <td data-label="Acciones">
            <div style="display:flex;gap:4px">
              <a href="/jugadores/ficha/${j.id}" class="btn-icon view" title="Ver ficha"><i class="bi bi-eye"></i></a>
              <a href="/jugadores/editar/${j.id}" class="btn-icon edit" title="Editar"><i class="bi bi-pencil"></i></a>
            </div>
          </td>
        </tr>
      `).join('');
    }
  </script>
</body>

</html>
