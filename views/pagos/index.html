<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Control de pagos mensuales de jugadores">
  <title>Pagos | futGistro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
  <style>
    .pagos-stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:16px; margin-bottom:24px; }
    .pago-stat-card { background:var(--bg-card); border:1px solid var(--border-color); border-radius:var(--radius-md); padding:20px; position:relative; overflow:hidden; transition:all var(--transition); }
    .pago-stat-card:hover { transform:translateY(-2px); box-shadow:var(--shadow-lg); }
    .pago-stat-card::after { content:''; position:absolute; bottom:0; left:0; right:0; height:3px; }
    .pago-stat-card.total-card::after    { background:linear-gradient(90deg,var(--secondary),var(--info)); }
    .pago-stat-card.pagado-card::after   { background:linear-gradient(90deg,var(--primary),var(--primary-light)); }
    .pago-stat-card.pendiente-card::after{ background:linear-gradient(90deg,var(--accent),#f97316); }
    .pago-stat-card.monto-card::after    { background:linear-gradient(90deg,#8b5cf6,#a78bfa); }
    .pago-stat-icon { width:44px; height:44px; border-radius:var(--radius-sm); display:flex; align-items:center; justify-content:center; font-size:20px; margin-bottom:12px; }
    .pago-stat-icon.blue   { background:rgba(14,165,233,0.15); color:var(--secondary); }
    .pago-stat-icon.green  { background:rgba(16,185,129,0.15); color:var(--primary-light); }
    .pago-stat-icon.amber  { background:rgba(245,158,11,0.15); color:var(--accent); }
    .pago-stat-icon.purple { background:rgba(139,92,246,0.15); color:#a78bfa; }
    .pago-stat-value { font-size:28px; font-weight:800; line-height:1; margin-bottom:4px; }
    .pago-stat-label { font-size:12px; color:var(--text-muted); font-weight:500; }
    .estado-badge { padding:5px 14px; border-radius:var(--radius-full); font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; display:inline-flex; align-items:center; gap:6px; cursor:pointer; transition:all var(--transition); border:none; }
    .estado-badge.pagado   { background:rgba(16,185,129,0.15); color:var(--primary-light); }
    .estado-badge.pendiente{ background:rgba(245,158,11,0.15); color:var(--accent); }
    .estado-badge:hover    { transform:scale(1.05); }
    .btn-toggle-pago { width:36px; height:36px; border-radius:var(--radius-sm); border:1px solid var(--border-color); background:transparent; cursor:pointer; display:inline-flex; align-items:center; justify-content:center; transition:all var(--transition-fast); font-size:16px; }
    .btn-toggle-pago.marcar-pagado   { color:var(--primary-light); }
    .btn-toggle-pago.marcar-pagado:hover   { background:rgba(16,185,129,0.15); border-color:rgba(16,185,129,0.3); }
    .btn-toggle-pago.marcar-pendiente{ color:var(--accent); }
    .btn-toggle-pago.marcar-pendiente:hover{ background:rgba(245,158,11,0.15); border-color:rgba(245,158,11,0.3); }
    .acciones-masivas { background:var(--bg-card); border:1px solid var(--primary); border-radius:var(--radius-md); padding:12px 20px; display:flex; align-items:center; gap:16px; margin-bottom:16px; animation:slideInRight 0.3s ease; box-shadow:0 0 20px rgba(16,185,129,0.15); }
    .acciones-masivas .count { font-weight:700; color:var(--primary-light); font-size:14px; }
    .month-pills { display:flex; flex-wrap:wrap; gap:6px; }
    .month-pill { padding:6px 14px; border-radius:var(--radius-full); font-size:12px; font-weight:600; border:1px solid var(--border-color); background:transparent; color:var(--text-secondary); cursor:pointer; transition:all var(--transition-fast); }
    .month-pill:hover  { background:rgba(148,163,184,0.1); color:var(--text-primary); }
    .month-pill.active { background:var(--primary); color:white; border-color:var(--primary); }
    .pago-modal-backdrop { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(15,23,42,0.85); backdrop-filter:blur(4px); z-index:5000; display:flex; align-items:center; justify-content:center; animation:fadeIn 0.2s ease; }
    .pago-modal { background:var(--bg-secondary); border:1px solid var(--border-color); border-radius:var(--radius-lg); width:95%; max-width:520px; max-height:90vh; overflow-y:auto; animation:scaleIn 0.2s ease; box-shadow:var(--shadow-xl); }
    .pago-modal-header { padding:20px 24px; border-bottom:1px solid var(--border-color); display:flex; align-items:center; justify-content:space-between; }
    .pago-modal-header h5 { font-weight:700; font-size:16px; margin:0; display:flex; align-items:center; gap:10px; }
    .pago-modal-body { padding:24px; }
    .pago-modal-footer { padding:16px 24px; border-top:1px solid var(--border-color); display:flex; justify-content:flex-end; gap:12px; }
    .pago-checkbox { width:18px; height:18px; accent-color:var(--primary); cursor:pointer; }
  </style>

  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#10b981">
  <link rel="apple-touch-icon" href="/icons/icon-192x192.png">
</head>

<body>
  <div class="app-layout" id="appLayout"></div>

  
  <script src="/js/utils.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/pagos.js"></script>
</body>

</html>
