<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Gestión de escuelas y sedes de fútbol">
    <link rel="icon" href="/icons/logo.png" type="image/png">
    <title>Escuelas / Sedes | futGistro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">

    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#10b981">
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png">
</head>

<body>
    <div class="app-layout" id="appLayout"></div>

    <!-- Modal para Crear / Editar -->
    <div class="modal fade" id="escuelaModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">Nueva Escuela</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form id="escuelaForm">
                    <div class="modal-body">
                        <input type="hidden" id="escuelaId">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label for="nombre" class="form-label-custom">Nombre de la escuela *</label>
                                <input type="text" id="nombre" class="form-control-custom"
                                    placeholder="Ej: Escuela Deportiva Norte" required>
                            </div>
                            <div class="col-md-6">
                                <label for="director" class="form-label-custom">Director / Responsable</label>
                                <input type="text" id="director" class="form-control-custom"
                                    placeholder="Nombre del director">
                            </div>
                            <div class="col-md-6">
                                <label for="departamento" class="form-label-custom">Departamento</label>
                                <select id="departamento" class="form-select-custom"></select>
                            </div>
                            <div class="col-md-6">
                                <label for="ciudad" class="form-label-custom">Ciudad</label>
                                <select id="ciudad" class="form-select-custom"></select>
                            </div>
                            <div class="col-md-12">
                                <label for="direccion" class="form-label-custom">Dirección</label>
                                <input type="text" id="direccion" class="form-control-custom"
                                    placeholder="Dirección de la sede">
                            </div>
                            <div class="col-md-6">
                                <label for="telefono" class="form-label-custom">Teléfono</label>
                                <input type="tel" id="telefono" class="form-control-custom"
                                    placeholder="Teléfono de contacto">
                            </div>
                            <div class="col-md-6">
                                <label for="email" class="form-label-custom">Email de contacto</label>
                                <input type="email" id="email" class="form-control-custom"
                                    placeholder="correo@escuela.com">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label-custom">Precio Mensualidad ($)</label>
                                <input type="number" step="0.01" id="precio_mensualidad" class="form-control-custom"
                                    placeholder="Ej: 50.00" value="0">
                            </div>
                            <div class="col-md-6" id="activaGroup" style="display:none">
                                <label class="form-label-custom">Estado</label>
                                <select id="activa" class="form-select-custom">
                                    <option value="true">Activa</option>
                                    <option value="false">Inactiva</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn-secondary-custom" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn-primary-custom" id="btnSave">
                            <i class="bi bi-check-circle"></i> Guardar
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/colombiaData.js"></script>
    <script src="/js/app.js"></script>
    <script src="/js/escuelas.js"></script>
</body>

</html>
